<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marksio Doğrulama Kodu</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;padding:48px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background:#171717;border:1px solid #262626;border-radius:12px;overflow:hidden;">

          <!-- Üst mavi çizgi -->
          <tr>
            <td style="height:3px;background:linear-gradient(90deg,#3B82F6,#60A5FA);"></td>
          </tr>

          <!-- Logo -->
          <tr>
            <td style="padding:32px 36px 24px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <img
                      src="https://app.marksio.com/marksio-logo.png"
                      alt="Marksio"
                      width="36"
                      height="36"
                      style="display:block;border-radius:8px;border:0;"
                    />
                  </td>
                  <td style="padding-left:10px;font-size:17px;font-weight:700;color:#E2E1EB;letter-spacing:-0.02em;vertical-align:middle;">
                    Marksio
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Gövde -->
          <tr>
            <td style="padding:0 36px 36px;">
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#E2E1EB;letter-spacing:-0.02em;">
                Doğrulama kodunuz
              </h1>
              <p style="margin:0 0 28px;font-size:14px;color:#8C909F;line-height:1.7;">
                Marksio'ya giriş yapmak için aşağıdaki 8 haneli kodu giriş ekranına girin.
                Kod <strong style="color:#C2C6D6;">10 dakika</strong> geçerlidir.
              </p>

              <!-- Kod kutusu -->
              <table cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:28px;">
                <tr>
                  <td align="center" style="background:#0f1117;border:2px solid #3B82F6;border-radius:12px;padding:24px 32px;">
                    <p style="margin:0 0 10px;font-size:11px;font-weight:600;color:#424754;letter-spacing:0.12em;text-transform:uppercase;">
                      Doğrulama Kodu
                    </p>
                    <p style="margin:0;font-size:42px;font-weight:800;color:#E2E1EB;letter-spacing:0.25em;font-family:'Courier New',Courier,monospace;line-height:1;">
                      {{ .Token }}
                    </p>
                  </td>
                </tr>
              </table>

              <!-- Güvenlik notu -->
              <table cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="background:#1a1a1a;border-radius:8px;padding:14px 16px;">
                    <p style="margin:0;font-size:12px;color:#525252;line-height:1.6;">
                      🔒 Bu kodu <strong style="color:#424754;">kimseyle paylaşmayın</strong>.
                      Giriş yapmaya çalışmadıysanız bu e-postayı güvenle silebilirsiniz.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:18px 36px;border-top:1px solid #262626;">
              <p style="margin:0;font-size:11px;color:#424754;">
                © 2026 Marksio &nbsp;·&nbsp; app.marksio.com
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
